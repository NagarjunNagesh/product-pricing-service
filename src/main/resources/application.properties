# ============================================================
# Application configuration
# ============================================================
spring.application.name=product-pricing-service

# ============================================================
# H2 In-memory database
# ============================================================
spring.datasource.url=jdbc:h2:mem:pricedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=${DB_PASSWORD:sa}

# H2 Console (accessible at /h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
#spring.h2.console.settings.web-allow-others=true

# ============================================================
# JPA / Hibernate
# ============================================================
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Defer SQL initialization until after JPA schema creation so that
# data.sql runs AFTER Hibernate has created the tables (Spring Boot 3.x).
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ============================================================
# Swagger / OpenAPI
# ============================================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method