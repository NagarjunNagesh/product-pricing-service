# ============================================================
# Production profile
# ============================================================
# Configure these via environment variables in deployment.
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=${DB_DRIVER:org.h2.Driver}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.h2.console.enabled=false

# Never recreate schema in production
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.defer-datasource-initialization=false
spring.sql.init.mode=never

# Restrict operational details in production
management.endpoint.health.show-details=when_authorized

# Disable Swagger UI and API docs in production
springdoc.swagger-ui.enabled=false
springdoc.api-docs.enabled=false

# Logging (Logback)
logging.file.name=${LOG_FILE:logs/product-pricing-service.log}
logging.level.root=${ROOT_LOG_LEVEL:INFO}
logging.level.org.springframework=${SPRING_LOG_LEVEL:INFO}
logging.level.org.hibernate=${HIBERNATE_LOG_LEVEL:WARN}
logging.level.com.example=${APP_LOG_LEVEL:INFO}
